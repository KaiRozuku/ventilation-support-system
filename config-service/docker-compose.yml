services:
  springboot-vault-docker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: springboot_vault_docker
    restart: always
    ports:
      - "8888:8888"
    networks:
      - app_network
  vault:
    image: hashicorp/vault:1.18.3
    container_name: spring_boot_vault_container
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOCAL_CONFIG: |
        {
          "ui": true
        }
    cap_add:
      - IPC_LOCK
    networks:
      - app_network
networks:
  app_network: