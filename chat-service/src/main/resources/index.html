<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
</head>
<body>

<input id="token" placeholder="JWT token"/>
<button onclick="connect()">Connect</button>

<hr/>

<input id="chatId" placeholder="chatId"/>
<button onclick="joinChat()">Join chat</button>

<hr/>

<input id="message" placeholder="message"/>
<button onclick="sendMessage()">Send</button>

<ul id="messages"></ul>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    function connect() {
        const token = document.getElementById("token").value;

        const socket = new SockJS("http://localhost:8083/ws");
        stompClient = Stomp.over(socket);

        stompClient.connect(
            { Authorization: "Bearer " + token },
            function () {
                console.log("Connected");

                // 🔥 ДОДАЙ ОЦЕ:
                stompClient.subscribe("/user/queue/messages", showMessage);
            }
        );
    }

    function joinChat() {
        const chatId = document.getElementById("chatId").value;

        console.log("JOIN CHAT:", chatId);

        stompClient.subscribe("/topic/chat/" + chatId, function (msg) {
            console.log("📩 RECEIVED RAW:", msg.body);
            showMessage(msg);
        });
    }

    function sendMessage() {
        const chatId = document.getElementById("chatId").value;
        const content = document.getElementById("message").value;

        console.log("📤 SENDING:", { chatId, content });

        stompClient.send("/app/chat.send", {}, JSON.stringify({
            chatId,
            content
        }));
    }

    function showMessage(msg) {
        console.log("📥 PARSING MESSAGE");

        try {
            const body = JSON.parse(msg.body);

            const li = document.createElement("li");
            li.innerText = body.senderId + ": " + body.content;

            document.getElementById("messages").appendChild(li);

        } catch (e) {
            console.log("⚠ NOT JSON:", msg.body);

            const li = document.createElement("li");
            li.innerText = msg.body;

            document.getElementById("messages").appendChild(li);
        }
    }

</script>

</body>
</html>
